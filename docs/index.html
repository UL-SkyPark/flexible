<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f5f96" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="근무표" />
    <title>근무표 모바일</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>근무표</h1>
        </div>
        <button id="installButton" class="icon-button hidden" type="button" title="홈 화면에 추가">＋</button>
      </header>

      <main>
        <section id="controlsPanel" class="controls" aria-label="근무표 설정">
          <div class="controls-head">
            <span class="controls-title">근무자</span>
            <p id="statusText">불러오는 중</p>
            <button id="controlsToggle" class="small-button" type="button" title="설정 접기">접기</button>
          </div>

          <div class="employee-row">
            <label class="field">
              <span>근무자</span>
              <select id="employeeSelect"></select>
            </label>
          </div>

          <div class="month-row">
            <button id="prevMonthButton" class="icon-button" type="button" title="이전 달">‹</button>
            <button id="todayButton" class="month-title" type="button">-</button>
            <button id="nextMonthButton" class="icon-button" type="button" title="다음 달">›</button>
            <button id="refreshButton" class="icon-button" type="button" title="새로고침">↻</button>
          </div>
        </section>

        <section class="calendar-wrap" aria-label="월간 근무표">
          <div class="weekday-row" aria-hidden="true">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </main>
    </div>

    <div id="dayModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalDate">
      <div id="modalBackdrop" class="modal-backdrop"></div>
      <section class="modal-card">
        <div class="modal-head">
          <div>
            <h2 id="modalDate">날짜</h2>
            <p id="modalEmployee">근무자</p>
          </div>
          <button id="modalCloseButton" class="icon-button" type="button" title="닫기">×</button>
        </div>

        <div class="modal-section">
          <span>근무 코드</span>
          <strong id="modalCode">-</strong>
        </div>

        <div class="modal-section">
          <span>메모</span>
          <p id="modalMemo">메모 없음</p>
        </div>
      </section>
    </div>
  </body>
</html>
